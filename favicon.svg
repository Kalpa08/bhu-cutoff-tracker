<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft aesthetic drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    
    <!-- Subtle Copybook / Graph Paper Grid -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#CBD5E1" stroke-width="3" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Base Canvas: Soft Warm Paper -->
  <rect width="512" height="512" rx="112" fill="#F8FAFC" />
  <rect width="512" height="512" rx="112" fill="url(#grid)" />

  <!-- The Cutoff Mark: Subtle Rose-Red Dashed Threshold -->
  <line x1="80" y1="200" x2="432" y2="200" stroke="#FB7185" stroke-width="16" stroke-dasharray="24 16" stroke-linecap="round" />

  <!-- The Open Book (Academics/Data) -->
  <g filter="url(#shadow)">
    <!-- Book Pages Outline -->
    <path d="M 112 320 Q 184 288 256 320 Q 328 288 400 320 V 432 Q 328 400 256 432 Q 184 400 112 432 Z" fill="#FFFFFF" stroke="#334155" stroke-width="24" stroke-linejoin="round" />
    <!-- Book Center Spine -->
    <line x1="256" y1="320" x2="256" y2="432" stroke="#334155" stroke-width="24" stroke-linecap="round" />
    <!-- Subtle Page Lines -->
    <path d="M 144 352 Q 200 328 240 344 M 368 352 Q 312 328 272 344" fill="none" stroke="#94A3B8" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- The Upward Graph Line (Success/Prediction) -->
  <path d="M 160 360 C 180 360, 240 120, 360 120" fill="none" stroke="#3B82F6" stroke-width="28" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- The Pencil (Drawing the line) -->
  <g transform="translate(360, 120) rotate(-55)" filter="url(#shadow)">
    <!-- Wood tip -->
    <polygon points="0,0 -16,-32 16,-32" fill="#FDE047" />
    <!-- Lead (Matches the blue graph line) -->
    <polygon points="0,0 -6,-12 6,-12" fill="#3B82F6" />
    <!-- Yellow Pencil Body -->
    <rect x="-16" y="-100" width="32" height="68" fill="#FCD34D" />
    <!-- Subtle Pencil Ridges -->
    <line x1="-8" y1="-96" x2="-8" y2="-36" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="-96" x2="8" y2="-36" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <!-- Silver Metal Band -->
    <rect x="-16" y="-116" width="32" height="16" fill="#CBD5E1" />
    <!-- Classic Pink Eraser -->
    <path d="M -16 -116 v -8 q 0 -12 16 -12 q 16 0 16 12 v 8 z" fill="#F472B6" />
  </g>
</svg>
